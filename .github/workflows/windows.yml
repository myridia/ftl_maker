name: Windows

on:
  push:
    branches: ["main"]
    tags:
      - '*'

  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write 
  issues: read
  packages: none

jobs:
  # Single deploy job since we're just deploying
  build_linux_windows:
    if: github.repository_owner == 'myridiax'
    runs-on: windows-latest
    steps:
      - name: Dependencies
        run: |
          git clone --depth 1 https://github.com/frang75/nappgui_src.git 
        
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: |
           cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
           cmake --build build       
           mv build/ftl_maker ftl_maker_mac 
        

      - name: Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: 'build/Release/bin/hello_c_nappgui.exe'
          tag: ${{ github.ref }}
          overwrite: true
          file_glob: true  
        


 
     
