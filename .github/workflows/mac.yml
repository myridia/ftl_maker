name: Mac
on:
  push:
    branches: ["main"]
    tags:
      - '*'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write 
  issues: read
  packages: none

jobs:
  build_macos_intel:
    if: github.repository_owner == 'myridia'
    runs-on: macos-latest
    steps:
       - name: Dependencies
         run: |
          BOOTSTRAP_TAR="bootstrap-macos14.5-trunk-arm64-20251114.tar.gz"
          BOOTSTRAP_SHA="512a3c209fa0e83b4f614bc6ce11928c10b75cd0" 
          curl -O https://pkgsrc.smartos.org/packages/Darwin/bootstrap/${BOOTSTRAP_TAR}
          sudo tar -zxpf ${BOOTSTRAP_TAR} -C /
          
       - name: Checkout
         uses: actions/checkout@v4

       - name: Build
         run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build       
          mv build/ftl_maker ftl_maker  

       - name: Release
         uses: svenstaro/upload-release-action@v2
         with:
           repo_token: ${{ secrets.GITHUB_TOKEN }}
           file: 'ftl_maker'
           tag: ${{ github.ref }}
           overwrite: true
           file_glob: true
